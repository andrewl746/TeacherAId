<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — TeacherAId</title>
  <link rel="icon" type="image/png" href="images/logoresized.png">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="auth-page">
    <div class="auth-left">
      <div class="auth-brand">
        <div class="auth-brand-logo"><img src="images/logo.png" alt="TeacherAId"/></div>
        <div class="auth-brand-name">Teacher<span>AId</span></div>
      </div>
      <h2 class="auth-heading" id="leftHeading">Welcome back.</h2>
      <p class="auth-sub" id="leftSub">Sign in to continue.</p>
    </div>

    <div class="auth-right">
      <div class="auth-card animate-in">
        <div class="auth-card-title" id="cardTitle">Sign in</div>
        <div class="auth-card-sub" id="cardSub">Enter your details below</div>

        <div id="alertBox"></div>

        <!-- Mode toggle -->
        <div style="display:flex;gap:0;background:var(--surface);border-radius:var(--radius-sm);padding:3px;margin-bottom:20px;">
          <button id="modeLogin" onclick="setMode('login')"
            style="flex:1;border:none;border-radius:6px;padding:7px 0;font-family:var(--font);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s;"
            class="mode-active">Sign In</button>
          <button id="modeRegister" onclick="setMode('register')"
            style="flex:1;border:none;border-radius:6px;padding:7px 0;font-family:var(--font);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s;background:transparent;color:var(--muted);">Create Account</button>
        </div>

        <div id="nameField" style="display:none;" class="form-group">
          <label class="form-label">Your name</label>
          <input class="form-input" type="text" id="nameInput" placeholder="Your full name" autocomplete="off"/>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="emailInput" placeholder="your@email.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="passwordInput" placeholder="Password" autocomplete="current-password"/>
        </div>

        <button class="btn btn-primary btn-lg w-full" id="submitBtn" onclick="submit()" style="margin-top:4px;">
          Sign In →
        </button>

        <div style="display:flex;align-items:center;gap:12px;margin:16px 0;">
          <div style="flex:1;height:1px;background:var(--border);"></div>
          <span style="font-size:.75rem;color:var(--muted);">or</span>
          <div style="flex:1;height:1px;background:var(--border);"></div>
        </div>

        <button class="btn btn-ghost btn-lg w-full" onclick="googleSignIn()" style="gap:8px;">
          <svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>

        <div class="auth-footer-link" style="margin-top:16px;">
          <a href="index.html" style="color:var(--muted);">← Back to home</a>
        </div>
      </div>
    </div>
  </div>

  <style>
    .mode-active { background: var(--card); color: var(--text); box-shadow: 0 1px 4px rgba(18,16,46,.08); }
  </style>

  <script type="module">
    import { registerUser, loginUser, loginWithGoogle, onAuthStateChanged, auth, getCurrentUserProfile }
      from './firebase.js';
    import { signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const params = new URLSearchParams(location.search);
    const role   = params.get('role') || 'teacher';
    let   mode   = 'login';
    let   manualLogin = false; // true while submit() is processing — blocks onAuthStateChanged

    // Set left panel copy
    if (role === 'teacher') {
      document.getElementById('leftHeading').textContent = 'Understand your class.';
      document.getElementById('leftSub').textContent = 'Generate questions, track misconceptions, and support every student.';
    } else {
      document.getElementById('leftHeading').textContent = 'Ready to learn?';
      document.getElementById('leftSub').textContent = 'Answer questions, explain your reasoning, and get instant AI feedback.';
    }

    // Only auto-redirect if user is ALREADY signed in when page loads (not during a fresh login)
    let authResolved = false;
    onAuthStateChanged(auth, async user => {
      if (manualLogin) return; // submit() is in control, do nothing
      if (authResolved) return; // only act once on page load
      authResolved = true;
      if (user) {
        const profile = await getCurrentUserProfile();
        if (!profile) return;
        if (profile.role === 'teacher') window.location.href = 'teacher-dashboard.html';
        else if (profile.role === 'student') window.location.href = 'student-dashboard.html';
      }
    });

    window.setMode = function(m) {
      mode = m;
      document.getElementById('nameField').style.display    = m === 'register' ? '' : 'none';
      document.getElementById('submitBtn').textContent      = m === 'register' ? 'Create Account →' : 'Sign In →';
      document.getElementById('cardTitle').textContent      = m === 'register' ? 'Create account' : 'Sign in';
      document.getElementById('cardSub').textContent        = m === 'register' ? `Register as a ${role}` : `Sign in to your ${role} account`;
      document.getElementById('modeLogin').className        = m === 'login'    ? 'mode-active' : '';
      document.getElementById('modeLogin').style.background    = m === 'login'    ? 'var(--card)'    : 'transparent';
      document.getElementById('modeLogin').style.color         = m === 'login'    ? 'var(--text)'    : 'var(--muted)';
      document.getElementById('modeRegister').className    = m === 'register' ? 'mode-active' : '';
      document.getElementById('modeRegister').style.background = m === 'register' ? 'var(--card)'    : 'transparent';
      document.getElementById('modeRegister').style.color      = m === 'register' ? 'var(--text)'    : 'var(--muted)';
    };

    window.submit = async function() {
      const email    = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const name     = document.getElementById('nameInput').value.trim();
      const alertBox = document.getElementById('alertBox');
      const btn      = document.getElementById('submitBtn');
      alertBox.innerHTML = '';

      if (!email || !password) {
        alertBox.innerHTML = '<div class="alert alert-error">Please fill in all fields.</div>';
        return;
      }
      if (mode === 'register' && !name) {
        alertBox.innerHTML = '<div class="alert alert-error">Please enter your name.</div>';
        return;
      }

      btn.disabled = true;
      btn.textContent = mode === 'register' ? 'Creating account…' : 'Signing in…';
      manualLogin = true;

      try {
        if (mode === 'register') {
          await registerUser(email, password, name, role);
          // registerUser triggers onAuthStateChanged but manualLogin blocks it
          // redirect manually
          if (role === 'teacher') window.location.href = 'teacher-dashboard.html';
          else window.location.href = 'student-dashboard.html';
        } else {
          await loginUser(email, password);
          const profile = await getCurrentUserProfile();
          if (!profile) throw new Error('Account not found. Please register first.');
          if (profile.role !== role) {
            await signOut(auth);
            manualLogin = false;
            alertBox.innerHTML = '<div class="alert alert-error">This email is already registered for a different account type.</div>';
            btn.disabled = false;
            btn.textContent = 'Sign In →';
            return;
          }
          if (profile.role === 'teacher') window.location.href = 'teacher-dashboard.html';
          else window.location.href = 'student-dashboard.html';
        }
      } catch(e) {
        manualLogin = false;
        const msgs = {
          'auth/email-already-in-use': 'An account with this email already exists. Try signing in.',
          'auth/wrong-password':       'Wrong password.',
          'auth/user-not-found':       'No account found with this email.',
          'auth/weak-password':        'Password must be at least 6 characters.',
          'auth/invalid-email':        'Invalid email address.',
          'auth/invalid-credential':   'Wrong email or password.',
        };
        alertBox.innerHTML = `<div class="alert alert-error">${msgs[e.code] || e.message}</div>`;
        btn.disabled = false;
        btn.textContent = mode === 'register' ? 'Create Account →' : 'Sign In →';
      }
    };

    window.googleSignIn = async function() {
      const name = document.getElementById('nameInput').value.trim() || null;
      const alertBox = document.getElementById('alertBox');
      manualLogin = true;
      try {
        await loginWithGoogle(role, name);
        const profile = await getCurrentUserProfile();
        if (profile && profile.role !== role) {
          await signOut(auth);
          manualLogin = false;
          alertBox.innerHTML = '<div class="alert alert-error">This email is already registered for a different account type.</div>';
          return;
        }
        if (profile?.role === 'teacher') window.location.href = 'teacher-dashboard.html';
        else window.location.href = 'student-dashboard.html';
      } catch(e) {
        manualLogin = false;
        const silent = ['auth/cancelled-popup-request','auth/popup-closed-by-user'];
        if (!silent.includes(e.code)) {
          alertBox.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
        }
      }
    };

    // Enter key
    ['emailInput','passwordInput','nameInput'].forEach(id => {
      document.getElementById(id)?.addEventListener('keydown', e => { if(e.key==='Enter') window.submit(); });
    });
  </script>
</body>
</html>
