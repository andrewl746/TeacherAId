<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TeacherAId — AI-Powered Learning</title>
  <link rel="icon" type="image/png" href="images/logoresized.png">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="home-page">
    <div class="home-inner">
      <div class="home-logo-wrap">
        <img src="images/logo.png" alt="TeacherAId"/>
      </div>
      <div class="home-eyebrow">Powered by AI</div>
      <h1 class="home-title">Teacher<span>AId</span></h1>
      <p class="home-sub">Identify student misconceptions, generate targeted questions, and close learning gaps automatically.</p>
      <div class="role-cards">
        <a href="auth-login.html?role=teacher" class="role-card">
          <div class="role-card-icon">🎓</div>
          <div class="role-card-title">Teacher</div>
          <div class="role-card-sub">Manage questions, view submissions & perform class analyses.</div>
          <div class="role-card-arrow">→</div>
        </a>
        <a href="auth-login.html?role=student" class="role-card">
          <div class="role-card-icon">📖</div>
          <div class="role-card-title">Student</div>
          <div class="role-card-sub">Answer questions and submit your reasoning.</div>
          <div class="role-card-arrow">→</div>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
